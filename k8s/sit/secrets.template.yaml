# ─────────────────────────────────────────────────────────────
# TEMPLATE ONLY — DO NOT commit real values
#
# Kubernetes Secrets are created/updated by the GitHub Actions
# deployment workflow from GitHub Repository Secrets.
# This file documents the expected secret keys.
#
# Manual creation (for reference / bootstrap):
#   kubectl create secret generic buyonline-secrets \
#     --namespace=buyonline-sit \
#     --from-literal=DATABASE_URL="postgresql://USER:PASS@127.0.0.1:5432/buyonline" \
#     --from-literal=REDIS_URL="redis://REDIS_PRIVATE_IP:6379" \
#     --from-literal=JWT_SECRET="REPLACE_32_CHAR_RANDOM_STRING" \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-REPLACE_KEY"
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: buyonline-secrets
  namespace: buyonline-sit
  labels:
    app: buyonline
    environment: sit
type: Opaque
stringData:
  # PostgreSQL connection string
  # When using Cloud SQL Auth Proxy (sidecar): host = 127.0.0.1
  # When using private IP direct:              host = CLOUD_SQL_PRIVATE_IP
  DATABASE_URL: "REPLACE_DATABASE_URL"

  # Cloud Memorystore (Redis) private IP
  REDIS_URL: "redis://REPLACE_REDIS_PRIVATE_IP:6379"

  # JWT signing secret — generate with: openssl rand -base64 32
  JWT_SECRET: "REPLACE_JWT_SECRET"

  # Anthropic API key for Claude chat
  ANTHROPIC_API_KEY: "REPLACE_ANTHROPIC_API_KEY"
