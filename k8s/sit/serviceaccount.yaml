# ─────────────────────────────────────────────────────────────
# Kubernetes Service Account with Workload Identity binding
#
# Prerequisites (run once by DevOps):
#   1. Create GCP Service Account (GSA):
#      gcloud iam service-accounts create buyonline-sit-sa \
#        --project=REPLACE_GCP_PROJECT_ID
#
#   2. Grant Cloud SQL client role to GSA:
#      gcloud projects add-iam-policy-binding REPLACE_GCP_PROJECT_ID \
#        --member="serviceAccount:buyonline-sit-sa@REPLACE_GCP_PROJECT_ID.iam.gserviceaccount.com" \
#        --role="roles/cloudsql.client"
#
#   3. Allow KSA to impersonate GSA (Workload Identity binding):
#      gcloud iam service-accounts add-iam-policy-binding \
#        buyonline-sit-sa@REPLACE_GCP_PROJECT_ID.iam.gserviceaccount.com \
#        --role="roles/iam.workloadIdentityUser" \
#        --member="serviceAccount:REPLACE_GCP_PROJECT_ID.svc.id.goog[buyonline-sit/buyonline-ksa]"
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: buyonline-ksa
  namespace: buyonline-sit
  annotations:
    # Replace with actual GSA email
    iam.gke.io/gcp-service-account: buyonline-sit-sa@REPLACE_GCP_PROJECT_ID.iam.gserviceaccount.com
  labels:
    app: buyonline
    environment: sit
