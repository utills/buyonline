# ─────────────────────────────────────────────────────────────
# BuyOnline API Deployment — SIT
#
# Image placeholder __API_IMAGE__ is replaced by the CI pipeline:
#   sed "s|__API_IMAGE__|${IMAGE}|g" deployment.yaml | kubectl apply -f -
#
# Cloud SQL Auth Proxy runs as a sidecar.
# The API connects to Cloud SQL at 127.0.0.1:5432 (localhost via proxy).
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buyonline-api
  namespace: buyonline-sit
  labels:
    app: buyonline-api
    environment: sit
    version: "latest"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: buyonline-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0         # Zero-downtime rollout
  template:
    metadata:
      labels:
        app: buyonline-api
        environment: sit
    spec:
      serviceAccountName: buyonline-ksa  # Workload Identity
      terminationGracePeriodSeconds: 30

      # ── Init container: wait for Cloud SQL Proxy to be ready ──
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Cloud SQL Proxy on 127.0.0.1:5432..."
              until nc -z 127.0.0.1 5432; do
                sleep 2
              done
              echo "DB proxy is ready"

      containers:
        # ── Main API container ────────────────────────────────
        - name: api
          image: __API_IMAGE__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: buyonline-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: buyonline-config
                  key: PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: buyonline-config
                  key: CORS_ORIGIN
            - name: CHAT_MODEL
              valueFrom:
                configMapKeyRef:
                  name: buyonline-config
                  key: CHAT_MODEL
            - name: CHAT_MAX_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: buyonline-config
                  key: CHAT_MAX_TOKENS
            - name: OTP_EXPIRY_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: buyonline-config
                  key: OTP_EXPIRY_SECONDS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: buyonline-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: buyonline-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: buyonline-secrets
                  key: JWT_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: buyonline-secrets
                  key: ANTHROPIC_API_KEY

          # Liveness: restart pod if app hangs
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness: remove from LB until app is ready
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

        # ── Cloud SQL Auth Proxy sidecar ──────────────────────
        # Provides secure, IAM-authenticated tunnel to Cloud SQL.
        # Requires:
        #   - Workload Identity on buyonline-ksa
        #   - GSA with roles/cloudsql.client
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--health-check"
            - "--http-port=9090"
            # Replace with actual instance connection name
            - "REPLACE_GCP_PROJECT_ID:REPLACE_GCP_REGION:REPLACE_CLOUD_SQL_INSTANCE_NAME"
          ports:
            - containerPort: 5432
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /liveness
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /readiness
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
