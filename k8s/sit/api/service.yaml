apiVersion: v1
kind: Service
metadata:
  name: buyonline-api-svc
  namespace: buyonline-sit
  labels:
    app: buyonline-api
    environment: sit
  annotations:
    # BackendConfig for GKE Ingress health check customisation
    cloud.google.com/backend-config: '{"default": "buyonline-api-backendconfig"}'
spec:
  type: ClusterIP
  selector:
    app: buyonline-api
  ports:
    - name: http
      port: 80
      targetPort: 3001
      protocol: TCP
---
# GKE BackendConfig — controls Cloud Load Balancer health check
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: buyonline-api-backendconfig
  namespace: buyonline-sit
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /
    port: 3001
  connectionDraining:
    drainingTimeoutSec: 30
