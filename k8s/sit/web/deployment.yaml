# ─────────────────────────────────────────────────────────────
# BuyOnline Web Deployment — SIT
#
# NEXT_PUBLIC_API_URL is baked into the image at build time.
# The CI pipeline substitutes __WEB_IMAGE__:
#   sed "s|__WEB_IMAGE__|${IMAGE}|g" deployment.yaml | kubectl apply -f -
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buyonline-web
  namespace: buyonline-sit
  labels:
    app: buyonline-web
    environment: sit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: buyonline-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: buyonline-web
        environment: sit
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: __WEB_IMAGE__
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
