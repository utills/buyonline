# ─────────────────────────────────────────────────────────────
# GKE Ingress with Google-managed SSL certificate
#
# Prerequisites (run once by DevOps):
#   1. Reserve a global static IP:
#        gcloud compute addresses create buyonline-sit-ip \
#          --global --project=REPLACE_GCP_PROJECT_ID
#        gcloud compute addresses describe buyonline-sit-ip --global
#
#   2. Point DNS A records to the reserved IP:
#        sit.REPLACE_YOUR_DOMAIN.com     → STATIC_IP
#        api-sit.REPLACE_YOUR_DOMAIN.com → STATIC_IP
#
#   3. Google-managed cert is provisioned automatically after
#      DNS propagation (may take 10–60 minutes on first deploy).
# ─────────────────────────────────────────────────────────────

# Google-managed SSL certificate
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: buyonline-sit-cert
  namespace: buyonline-sit
spec:
  domains:
    - sit.REPLACE_YOUR_DOMAIN.com
    - api-sit.REPLACE_YOUR_DOMAIN.com

---
# Frontend redirect policy: HTTP → HTTPS
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: buyonline-sit-frontend
  namespace: buyonline-sit
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT

---
# GKE Ingress (uses GCP Cloud Load Balancer)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: buyonline-sit-ingress
  namespace: buyonline-sit
  labels:
    app: buyonline
    environment: sit
  annotations:
    # GKE native ingress (GCE L7 load balancer)
    kubernetes.io/ingress.class: "gce"

    # Static IP reserved above
    kubernetes.io/ingress.global-static-ip-name: "buyonline-sit-ip"

    # Managed certificate
    networking.gke.io/managed-certificates: "buyonline-sit-cert"

    # HTTP→HTTPS redirect
    networking.gke.io/v1beta1.FrontendConfig: "buyonline-sit-frontend"

spec:
  rules:
    # Web frontend
    - host: sit.REPLACE_YOUR_DOMAIN.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: buyonline-web-svc
                port:
                  number: 80

    # API backend
    - host: api-sit.REPLACE_YOUR_DOMAIN.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: buyonline-api-svc
                port:
                  number: 80
