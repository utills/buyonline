name: Deploy to SIT

on:
  push:
    branches: [main]

# Prevent concurrent deployments to SIT
concurrency:
  group: deploy-sit
  cancel-in-progress: false  # Queue — never cancel an in-flight deployment

env:
  PNPM_VERSION: "10.30.1"
  NODE_VERSION: "22"
  NAMESPACE: buyonline-sit

  # ── GCP configuration (set as GitHub Variables, not Secrets) ──
  # Settings → Secrets and variables → Actions → Variables tab
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}                             # e.g. asia-south1
  GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
  ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}    # e.g. asia-south1-docker.pkg.dev/PROJECT/buyonline
  SIT_API_URL: ${{ vars.SIT_API_URL }}                          # e.g. https://api-sit.example.com

  # Cloud SQL instance connection name — also in configmap.yaml
  CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE }}            # PROJECT:REGION:INSTANCE

  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1: Run CI checks first
  # ────────────────────────────────────────────────────────────────
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/api && pnpm exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: cd apps/api && pnpm test

  # ────────────────────────────────────────────────────────────────
  # JOB 2: Build & Push Docker images to Artifact Registry
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: ci-checks
    permissions:
      contents: read
      id-token: write       # Required for Workload Identity Federation

    outputs:
      api-image: ${{ steps.meta-api.outputs.image }}
      web-image: ${{ steps.meta-web.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP using Workload Identity Federation ──
      # No long-lived service account keys needed.
      # See DEPLOYMENT.md → "GitHub Secrets & Variables" for setup.
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API Image ─────────────────────────────────────────────
      - name: Compute API image tags
        id: meta-api
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY_REPO }}/api"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:${{ env.IMAGE_TAG }},${IMAGE}:sit-latest" >> "$GITHUB_OUTPUT"

      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha,scope=api-sit
          cache-to: type=gha,mode=max,scope=api-sit

      # ── Web Image ─────────────────────────────────────────────
      - name: Compute Web image tags
        id: meta-web
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY_REPO }}/web"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:${{ env.IMAGE_TAG }},${IMAGE}:sit-latest" >> "$GITHUB_OUTPUT"

      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.SIT_API_URL }}
          cache-from: type=gha,scope=web-sit
          cache-to: type=gha,mode=max,scope=web-sit

  # ────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to GKE SIT
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE SIT
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    environment:
      name: sit
      url: https://sit.${{ vars.SIT_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      # ── 1. Namespace & base resources ─────────────────────────
      - name: Apply namespace
        run: kubectl apply -f k8s/sit/namespace.yaml

      - name: Apply service account
        run: |
          # Substitute GSA email placeholder before applying
          sed "s|REPLACE_GCP_PROJECT_ID|${{ env.GCP_PROJECT_ID }}|g" \
            k8s/sit/serviceaccount.yaml | kubectl apply -f -

      - name: Apply configmap
        run: |
          sed "s|REPLACE_GCP_PROJECT_ID|${{ env.GCP_PROJECT_ID }}|g" \
            k8s/sit/configmap.yaml \
          | sed "s|REPLACE_GCP_REGION|${{ env.GCP_REGION }}|g" \
          | sed "s|REPLACE_CLOUD_SQL_INSTANCE_NAME|${{ vars.CLOUD_SQL_INSTANCE_NAME }}|g" \
          | kubectl apply -f -

      # ── 2. Secrets (from GitHub Secrets → K8s Secret) ─────────
      - name: Create/Update application secrets
        run: |
          kubectl create secret generic buyonline-secrets \
            --namespace="${{ env.NAMESPACE }}" \
            --from-literal=DATABASE_URL="${{ secrets.SIT_DATABASE_URL }}" \
            --from-literal=REDIS_URL="${{ secrets.SIT_REDIS_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.SIT_JWT_SECRET }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── 3. Run database migrations ─────────────────────────────
      - name: Delete previous migration job (if exists)
        run: |
          kubectl delete job buyonline-db-migrate \
            -n "${{ env.NAMESPACE }}" --ignore-not-found=true

      - name: Apply migration job
        run: |
          API_IMAGE="${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ env.IMAGE_TAG }}"
          sed "s|__API_IMAGE__|${API_IMAGE}|g" k8s/sit/api/migration-job.yaml \
          | sed "s|REPLACE_GCP_PROJECT_ID|${{ env.GCP_PROJECT_ID }}|g" \
          | sed "s|REPLACE_GCP_REGION|${{ env.GCP_REGION }}|g" \
          | sed "s|REPLACE_CLOUD_SQL_INSTANCE_NAME|${{ vars.CLOUD_SQL_INSTANCE_NAME }}|g" \
          | kubectl apply -f -

      - name: Wait for migration to complete
        run: |
          kubectl wait --for=condition=complete \
            job/buyonline-db-migrate \
            -n "${{ env.NAMESPACE }}" \
            --timeout=180s

      - name: Print migration logs
        if: always()
        run: |
          kubectl logs \
            -l app=buyonline-migration \
            -n "${{ env.NAMESPACE }}" \
            --tail=100 || true

      # ── 4. Deploy API ─────────────────────────────────────────
      - name: Deploy API
        run: |
          API_IMAGE="${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ env.IMAGE_TAG }}"
          sed "s|__API_IMAGE__|${API_IMAGE}|g" k8s/sit/api/deployment.yaml \
          | sed "s|REPLACE_GCP_PROJECT_ID|${{ env.GCP_PROJECT_ID }}|g" \
          | sed "s|REPLACE_GCP_REGION|${{ env.GCP_REGION }}|g" \
          | sed "s|REPLACE_CLOUD_SQL_INSTANCE_NAME|${{ vars.CLOUD_SQL_INSTANCE_NAME }}|g" \
          | kubectl apply -f -

          kubectl apply -f k8s/sit/api/service.yaml
          kubectl apply -f k8s/sit/api/hpa.yaml

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/buyonline-api \
            -n "${{ env.NAMESPACE }}" \
            --timeout=5m

      # ── 5. Deploy Web ─────────────────────────────────────────
      - name: Deploy Web
        run: |
          WEB_IMAGE="${{ env.ARTIFACT_REGISTRY_REPO }}/web:${{ env.IMAGE_TAG }}"
          sed "s|__WEB_IMAGE__|${WEB_IMAGE}|g" k8s/sit/web/deployment.yaml \
          | kubectl apply -f -

          kubectl apply -f k8s/sit/web/service.yaml
          kubectl apply -f k8s/sit/web/hpa.yaml

      - name: Wait for Web rollout
        run: |
          kubectl rollout status deployment/buyonline-web \
            -n "${{ env.NAMESPACE }}" \
            --timeout=5m

      # ── 6. Ingress ────────────────────────────────────────────
      - name: Apply Ingress & Managed Certificate
        run: |
          sed "s|REPLACE_YOUR_DOMAIN|${{ vars.SIT_DOMAIN }}|g" \
            k8s/sit/ingress.yaml | kubectl apply -f -

      # ── 7. Deployment summary ─────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "## SIT Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| API | \`${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ env.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web | \`${{ env.ARTIFACT_REGISTRY_REPO }}/web:${{ env.IMAGE_TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deployed by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pods:" >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n "${{ env.NAMESPACE }}" \
            --no-headers \
            -o custom-columns='NAME:.metadata.name,STATUS:.status.phase,READY:.status.containerStatuses[0].ready' \
            >> "$GITHUB_STEP_SUMMARY" || true

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::SIT deployment failed. Check logs above."
          echo "Rolling back API..."
          kubectl rollout undo deployment/buyonline-api \
            -n "${{ env.NAMESPACE }}" || true
          echo "Rolling back Web..."
          kubectl rollout undo deployment/buyonline-web \
            -n "${{ env.NAMESPACE }}" || true
