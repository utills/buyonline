name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]   # main push is handled by deploy-sit.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.30.1"
  NODE_VERSION: "22"

jobs:
  # ── Lint & Type-check ──────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  # ── Build ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate Prisma client (needed for API build)
      - name: Generate Prisma client
        run: cd apps/api && pnpm exec prisma generate

      - name: Build all packages
        env:
          # Stub value so Next.js build doesn't fail on missing env
          NEXT_PUBLIC_API_URL: "https://api-sit.example.com"
        run: pnpm build

  # ── Unit tests ─────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/api && pnpm exec prisma generate

      - name: Run API tests
        run: cd apps/api && pnpm test

  # ── Docker build validation ────────────────────────────────────
  docker-validate:
    name: Validate Docker Builds
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate API Dockerfile (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: buyonline/api:ci-validate
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Validate Web Dockerfile (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: buyonline/web:ci-validate
          build-args: |
            NEXT_PUBLIC_API_URL=https://api-sit.example.com
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
