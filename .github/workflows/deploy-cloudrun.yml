name: Deploy to Cloud Run

on:
  push:
    branches: [main]

# Never cancel an in-flight deployment — queue instead
concurrency:
  group: deploy-cloudrun
  cancel-in-progress: false

env:
  PNPM_VERSION: "10.30.1"
  NODE_VERSION: "22"
  IMAGE_TAG: ${{ github.sha }}

  # ── Set these in GitHub → Settings → Secrets and variables → Actions → Variables ──
  GCP_PROJECT_ID:          ${{ vars.GCP_PROJECT_ID }}           # e.g. my-gcp-project
  GCP_REGION:              ${{ vars.GCP_REGION }}               # e.g. asia-south1
  ARTIFACT_REGISTRY_REPO:  ${{ vars.ARTIFACT_REGISTRY_REPO }}  # e.g. asia-south1-docker.pkg.dev/my-project/buyonline
  CLOUD_SQL_INSTANCE:      ${{ vars.CLOUD_SQL_INSTANCE }}       # e.g. my-project:asia-south1:buyonline-pg
  VPC_CONNECTOR:           ${{ vars.VPC_CONNECTOR }}            # e.g. projects/my-project/locations/asia-south1/connectors/buyonline-connector
  API_SERVICE_NAME:        ${{ vars.API_SERVICE_NAME || 'buyonline-api' }}
  WEB_SERVICE_NAME:        ${{ vars.WEB_SERVICE_NAME || 'buyonline-web' }}
  # Public URL of the API Cloud Run service — used to bake NEXT_PUBLIC_API_URL into the web image
  # Set this after first deploy or when you assign a custom domain to the API service
  SIT_API_URL:             ${{ vars.SIT_API_URL }}              # e.g. https://buyonline-api-xxxx-as.a.run.app

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Lint, type-check, unit tests
  # ──────────────────────────────────────────────────────────────
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/api && pnpm exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: cd apps/api && pnpm test

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Build Docker images and push to Artifact Registry
  # ──────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: ci-checks
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    outputs:
      api-image: ${{ steps.images.outputs.api }}
      web-image: ${{ steps.images.outputs.web }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image names
        id: images
        run: |
          echo "api=${{ env.ARTIFACT_REGISTRY_REPO }}/api" >> "$GITHUB_OUTPUT"
          echo "web=${{ env.ARTIFACT_REGISTRY_REPO }}/web" >> "$GITHUB_OUTPUT"

      # ── API image ─────────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.api }}:${{ env.IMAGE_TAG }}
            ${{ steps.images.outputs.api }}:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=api-cloudrun
          cache-to: type=gha,mode=max,scope=api-cloudrun

      # ── Web image ─────────────────────────────────────────────
      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.web }}:${{ env.IMAGE_TAG }}
            ${{ steps.images.outputs.web }}:latest
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.SIT_API_URL }}
          cache-from: type=gha,scope=web-cloudrun
          cache-to: type=gha,mode=max,scope=web-cloudrun

  # ──────────────────────────────────────────────────────────────
  # JOB 3: Run database migrations via Cloud Run Job
  # ──────────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy migration Cloud Run Job
        run: |
          API_IMAGE="${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ env.IMAGE_TAG }}"

          gcloud run jobs deploy buyonline-db-migrate \
            --image "$API_IMAGE" \
            --command "/app/node_modules/.bin/prisma" \
            --args "migrate,deploy" \
            --region "${{ env.GCP_REGION }}" \
            --add-cloudsql-instances "${{ env.CLOUD_SQL_INSTANCE }}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --vpc-connector "${{ env.VPC_CONNECTOR }}" \
            --memory 512Mi \
            --cpu 1 \
            --max-retries 1 \
            --project "${{ env.GCP_PROJECT_ID }}"

      - name: Execute migration job
        run: |
          gcloud run jobs execute buyonline-db-migrate \
            --region "${{ env.GCP_REGION }}" \
            --wait \
            --project "${{ env.GCP_PROJECT_ID }}"

      - name: Print migration logs
        if: always()
        run: |
          EXECUTION=$(gcloud run jobs executions list \
            --job buyonline-db-migrate \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --limit 1 \
            --format "value(name)")
          gcloud run jobs executions logs "$EXECUTION" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" || true

  # ──────────────────────────────────────────────────────────────
  # JOB 4: Deploy API service
  # ──────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      id-token: write

    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE_NAME }}
          image: ${{ env.ARTIFACT_REGISTRY_REPO }}/api:${{ env.IMAGE_TAG }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          flags: >-
            --add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }}
            --vpc-connector=${{ env.VPC_CONNECTOR }}
            --vpc-egress=private-ranges-only
            --min-instances=1
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --concurrency=100
            --timeout=60s
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            COMMS_TENANT=PHIL
            COMMS_UNIQUE_ID=${{ vars.COMMS_UNIQUE_ID }}
            COMMS_ACCEPT_LANGUAGE=${{ vars.COMMS_ACCEPT_LANGUAGE }}
            COMMS_API_BASE_URL=${{ vars.COMMS_API_BASE_URL }}
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            REDIS_URL=REDIS_URL:latest
            JWT_SECRET=JWT_SECRET:latest
            ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
            COMMS_API_KEY=COMMS_API_KEY:latest

      - name: Show API URL
        run: echo "API deployed to ${{ steps.deploy.outputs.url }}"

  # ──────────────────────────────────────────────────────────────
  # JOB 5: Deploy Web service
  # ──────────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: deploy-api
    permissions:
      contents: read
      id-token: write

    environment:
      name: sit
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Web to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.WEB_SERVICE_NAME }}
          image: ${{ env.ARTIFACT_REGISTRY_REPO }}/web:${{ env.IMAGE_TAG }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          flags: >-
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=30s
            --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            NEXT_PUBLIC_API_URL=${{ env.SIT_API_URL }}

      - name: Show Web URL
        run: echo "Web deployed to ${{ steps.deploy.outputs.url }}"

      # ── Deployment summary ────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "## Cloud Run Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web     | ${{ steps.deploy.outputs.url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API     | ${{ env.SIT_API_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tag:** \`${{ env.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deployed by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Deployment failed. Rolling back..."
          gcloud run services update-traffic ${{ env.WEB_SERVICE_NAME }} \
            --to-revisions=PREVIOUS=100 \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" || true
          gcloud run services update-traffic ${{ env.API_SERVICE_NAME }} \
            --to-revisions=PREVIOUS=100 \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" || true
