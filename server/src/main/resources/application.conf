ktor {
    deployment {
        port = 8080
        host = "0.0.0.0"
    }
    application {
        modules = [ com.prudential.health.server.ApplicationKt.module ]
    }
}

jwt {
    secret = "dev-only-secret-do-not-use-in-production"
    secret = ${?JWT_SECRET}
    adminSecret = "dev-only-admin-secret-change-in-production"
    adminSecret = ${?JWT_ADMIN_SECRET}
    issuer = "pru-health-api"
    audience = "pru-health-app"
    realm = "Pru Health Step Tracker"
    expiresInMs = 86400000
}

database {
    # H2 for development (swap to PostgreSQL for Cloud SQL production)
    driver = "org.h2.Driver"
    url = "jdbc:h2:file:./data/health;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
    user = "sa"
    password = ""
    maxPoolSize = 10

    # PostgreSQL / Cloud SQL production config (uncomment to use):
    # driver = "org.postgresql.Driver"
    # url = "jdbc:postgresql:///<DB_NAME>?cloudSqlInstance=<INSTANCE_CONNECTION_NAME>&socketFactory=com.google.cloud.sql.postgres.SocketFactory"
    # user = "postgres"
    # password = "${DB_PASSWORD}"
    # maxPoolSize = 20
}
